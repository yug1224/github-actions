# Lefthook Configuration
# pre-commit: ステージ済みファイルの lint 自動修正 + フォーマット
# 型チェック・テストは CI（fmt / lint / type / test）に委譲

pre-commit:
  parallel: true
  commands:
    lint:
      glob: '**/*.{ts,tsx}'
      run: pnpm run lint:fix -- {staged_files}

    fmt:
      glob: '**/*.{ts,tsx,js,jsx,json,jsonc,md,mdc,yml,yaml}'
      run: pnpm run fmt:fix -- {staged_files}
      stage_fixed: true
