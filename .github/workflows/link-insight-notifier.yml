name: Link Insight Notifier
on:
  workflow_dispatch:
    inputs:
      link:
        description: 'LINK'
        required: true
jobs:
  link-insight-notifier:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: link-insight-notifier
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@c785b87e244131f27c9f19c1a33e2ead956ab7ce # v1.7.3
        with:
          chrome-version: latest
      - name: Install pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v4.0.0
        with:
          version: 11
      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d977327f9ca9d478cc2c9a4172 # v6.0.0
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ github.workspace }}
      - name: Install dotenvx
        run: curl -sfS https://dotenvx.sh/install.sh | sh
      - name: Run notifier
        run: |
          dotenvx run -- pnpm start
          ls -la
        env:
          DOTENV_PRIVATE_KEY: ${{secrets.DOTENV_PRIVATE_KEY_LINK_INSIGHT_NOTIFIER}}
          LINK: ${{github.event.inputs.link}}
