name: GitHub Star Notifier
on:
  schedule:
    # 15分ごとに実行
    - cron: '0/15 * * * *'
  workflow_dispatch:
jobs:
  github-star-notifier:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: github-star-notifier
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v4.0.0
        with:
          version: 11
      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d977327f9ca9d478cc2c9a4172 # v6.0.0
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ github.workspace }}
      - name: Create directories
        run: mkdir -p data temp
      - name: Restore timestamp cache
        id: restore_cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: github-star-notifier/data/.timestamp
          key: github-star-notifier-timestamp-${{ github.run_id }}
          restore-keys: github-star-notifier-timestamp-
      - name: Install dotenvx
        run: curl -sfS https://dotenvx.sh/install.sh | sh
      - name: Run notifier
        run: dotenvx run -- pnpm start
        env:
          DOTENV_PRIVATE_KEY: ${{ secrets.DOTENV_PRIVATE_KEY_GITHUB_STAR_NOTIFIER }}
      - name: Save timestamp cache
        uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        if: always()
        with:
          path: github-star-notifier/data/.timestamp
          key: github-star-notifier-timestamp-${{ github.run_id }}
